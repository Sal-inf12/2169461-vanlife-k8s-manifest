apiVersion: apps/v1
kind: Deployment
metadata:
  name: vanlife-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vanlife-api
  template:
    metadata:
      labels:
        app: vanlife-api
    spec:
      containers:
        - name: vanlife-api
          image: salah212/vanlife-api:1.0
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: "10.10.3.6"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "vanlife_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: vanlife-db-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vanlife-db-secret
                  key: DB_PASSWORD
            - name: PORT
              value: "3000"